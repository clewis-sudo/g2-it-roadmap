<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G2 IT Roadmap — FY27</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --border-med: rgba(0,0,0,0.14);
    --text: #1a1a18;
    --text-2: #5a5a56;
    --text-3: #9a9a94;
    --blue: #185FA5; --blue-bg: #E6F1FB;
    --green: #3B6D11; --green-bg: #EAF3DE; --green-mid: #639922;
    --amber: #854F0B; --amber-bg: #FAEEDA; --amber-mid: #BA7517;
    --pink: #993556; --pink-bg: #FBEAF0; --pink-mid: #D4537E;
    --red: #A32D2D; --red-bg: #FCEBEB; --red-mid: #E24B4A;
    --gray-bg: #F1EFE8; --gray-mid: #888780; --gray-dark: #5F5E5A;
    --font: 'DM Sans', system-ui, sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 10px;
    --radius-lg: 14px;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }

  /* ── Header ── */
  .page-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 1.75rem;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .page-header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .page-header .meta {
    font-size: 13px;
    color: var(--text-3);
    margin-top: 3px;
    font-family: var(--mono);
  }
  .refresh-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-family: var(--font);
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border-med);
    background: var(--surface);
    cursor: pointer;
    color: var(--text-2);
    transition: background 0.15s;
  }
  .refresh-btn:hover { background: var(--bg); }
  .refresh-icon { font-size: 13px; }

  /* ── Metrics ── */
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.25rem;
  }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
  }
  .metric .m-label {
    font-size: 11px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .metric .m-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .metric .m-val { font-size: 28px; font-weight: 600; letter-spacing: -0.03em; }
  .metric .m-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }

  /* ── Pillar cards ── */
  .pillars {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.25rem;
  }
  .pillar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
  }
  .pillar-card .p-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: .6rem;
  }
  .pillar-card .p-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .pillar-card .p-count {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .pillar-bar-track {
    height: 5px;
    border-radius: 3px;
    background: var(--border);
    margin-bottom: .7rem;
    overflow: hidden;
  }
  .pillar-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .pillar-stats { display: flex; flex-direction: column; gap: 4px; }
  .pillar-stat {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-2);
  }
  .pillar-stat .ps-left { display: flex; align-items: center; gap: 5px; }
  .ps-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* ── Initiatives table ── */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .table-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: .875rem 1.25rem;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .table-toolbar .toolbar-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-right: 4px;
    flex-shrink: 0;
  }
  .filter-btn {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border-med);
    background: transparent;
    cursor: pointer;
    color: var(--text-2);
    font-family: var(--font);
    transition: all 0.12s;
    white-space: nowrap;
  }
  .filter-btn:hover { background: var(--bg); }
  .filter-btn.active {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }
  .col-head {
    display: grid;
    grid-template-columns: 36px minmax(0,1fr) 130px 90px 110px;
    gap: 8px;
    padding: .5rem 1.25rem;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: .06em;
    font-weight: 500;
  }
  .init-row {
    display: grid;
    grid-template-columns: 36px minmax(0,1fr) 130px 90px 110px;
    gap: 8px;
    padding: .625rem 1.25rem;
    border-bottom: 1px solid var(--border);
    align-items: center;
    transition: background 0.1s;
  }
  .init-row:last-child { border-bottom: none; }
  .init-row:hover { background: var(--bg); }
  .row-num { font-size: 12px; color: var(--text-3); text-align: right; font-family: var(--mono); }
  .row-name { font-size: 13px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-pillar { font-size: 11px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 5px;
    white-space: nowrap;
  }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  .p-critical { background: #FAECE7; color: #993C1D; }
  .p-high     { background: var(--blue-bg); color: var(--blue); }
  .p-medium   { background: var(--green-bg); color: var(--green); }

  .s-inprog   { background: var(--green-bg); color: var(--green); }
  .s-planned  { background: var(--gray-bg); color: var(--gray-dark); }
  .s-blocked  { background: var(--red-bg); color: var(--red); }
  .s-complete { background: #E6F1FB; color: var(--blue); }

  /* ── Pagination ── */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .75rem 1.25rem;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-3);
    font-family: var(--mono);
  }
  .pg-btns { display: flex; gap: 6px; }
  .pg-btn {
    padding: 4px 12px;
    border: 1px solid var(--border-med);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    font-size: 12px;
    color: var(--text-2);
    font-family: var(--font);
    transition: background 0.12s;
  }
  .pg-btn:hover:not(:disabled) { background: var(--bg); }
  .pg-btn:disabled { opacity: 0.3; cursor: default; }

  /* ── Loading / Error ── */
  .state-msg {
    padding: 3rem;
    text-align: center;
    color: var(--text-3);
    font-size: 14px;
  }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--text-2);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-bottom: .75rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .pillars { grid-template-columns: repeat(2, 1fr); }
    .metrics { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    body { padding: 1rem; }
    .pillars, .metrics { grid-template-columns: 1fr 1fr; }
    .col-head, .init-row { grid-template-columns: 28px minmax(0,1fr) 80px 90px; }
    .col-head .ch-pillar, .init-row .row-pillar { display: none; }
  }
</style>
</head>
<body>

<div class="page-header">
  <div>
    <h1>IT Roadmap</h1>
    <div class="meta" id="lastUpdated">Loading…</div>
  </div>
  <button class="refresh-btn" onclick="loadData()">
    <span class="refresh-icon">↻</span> Refresh
  </button>
</div>

<div class="metrics" id="metrics">
  <div class="state-msg" style="grid-column:1/-1"><div class="spinner"></div><br>Loading data…</div>
</div>

<div class="pillars" id="pillars"></div>

<div class="table-card">
  <div class="table-toolbar">
    <span class="toolbar-title">Initiatives</span>
    <div id="filterBtns"></div>
  </div>
  <div class="col-head">
    <span>#</span>
    <span>Initiative</span>
    <span class="ch-pillar">Sub-pillar</span>
    <span>Priority</span>
    <span>Status</span>
  </div>
  <div id="initList"><div class="state-msg"><div class="spinner"></div><br>Loading…</div></div>
  <div class="pagination">
    <span id="pgInfo">—</span>
    <div class="pg-btns">
      <button class="pg-btn" id="pgPrev" onclick="changePage(-1)">← Prev</button>
      <button class="pg-btn" id="pgNext" onclick="changePage(1)">Next →</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
// This URL fetches your Google Sheet as CSV. The sheet must be published:
// File → Share → Publish to web → Sheet1 → CSV → Publish
const SHEET_ID = '1Ls_h48lYCXeAhtC8TL5QLNPLsLo8iUZFtPf5VXXoJXM';
const DIRECT_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv&gid=359181435';
const CSV_URL = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(DIRECT_URL);
// ────────────────────────────────────────────────────────────────────────────

const PILLAR_COLORS = {
  'Integration':          { bar:'#378ADD', bg:'#E6F1FB', text:'#185FA5' },
  'AI & Automation':      { bar:'#1D9E75', bg:'#E1F5EE', text:'#0F6E56' },
  'Infrastructure':       { bar:'#BA7517', bg:'#FAEEDA', text:'#854F0B' },
  'Vendor Consolidation': { bar:'#D4537E', bg:'#FBEAF0', text:'#993556' },
};
const STATUS_DOT = {
  'In Progress':'#639922','Planned':'#888780','Blocked':'#E24B4A','Complete':'#185FA5'
};
const PAGE_SIZE = 12;
let allData = [], filtered = [], page = 0, activeFilter = 'All';

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim());
  return lines.slice(1).map((line, i) => {
    const vals = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|(?<=,)$|^(?=,))/g) || [];
    const obj = { _n: i + 1 };
    headers.forEach((h, idx) => {
      obj[h] = (vals[idx] || '').replace(/^"|"$/g,'').trim();
    });
    return obj;
  }).filter(r => r['Initiative Name'] || r['initiative_name'] || r['Name']);
}

function normalise(row) {
  const get = (...keys) => { for (const k of keys) if (row[k]) return row[k]; return ''; };
  return {
    n:       row._n,
    pillar:  get('Pillar','pillar','PILLAR'),
    sub:     get('Sub-Pillar','Sub Pillar','sub_pillar','Sub-pillar'),
    name:    get('Initiative Name','initiative_name','Name','name'),
    priority:get('Priority','priority'),
    fy:      get('FY','fy','Fiscal Year'),
    status:  get('Status','status'),
  };
}

async function loadData() {
  document.getElementById('lastUpdated').textContent = 'Refreshing…';
  document.getElementById('initList').innerHTML = '<div class="state-msg"><div class="spinner"></div><br>Loading…</div>';

  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const raw = parseCSV(text);
    allData = raw.map(normalise).filter(r => r.name);
    document.getElementById('lastUpdated').textContent =
      `${allData.length} initiatives · updated ${new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}`;
    renderAll();
  } catch(e) {
    document.getElementById('lastUpdated').textContent = 'Error loading data';
    document.getElementById('initList').innerHTML =
      `<div class="state-msg">⚠ Could not load data.<br><small style="font-family:monospace;color:#aaa">${e.message}</small><br><br>Make sure the sheet is published:<br>File → Share → Publish to web → CSV</div>`;
  }
}

function renderAll() {
  renderMetrics();
  renderPillars();
  renderFilters();
  applyFilter(activeFilter);
}

function renderMetrics() {
  const total    = allData.length;
  const inprog   = allData.filter(d => d.status === 'In Progress').length;
  const planned  = allData.filter(d => d.status === 'Planned').length;
  const blocked  = allData.filter(d => d.status === 'Blocked').length;
  const critical = allData.filter(d => d.priority === 'Critical').length;

  document.getElementById('metrics').innerHTML = [
    { val: total,    label: 'Total initiatives', sub: 'FY27 + FY28', dot: null,       color: '#1a1a18' },
    { val: inprog,   label: 'In progress',        sub: `${Math.round(inprog/total*100)}% of roadmap`, dot:'#639922', color:'#3B6D11' },
    { val: planned,  label: 'Planned',             sub: 'Not yet started',               dot:'#888780', color:'#5a5a56' },
    { val: blocked,  label: 'Blocked',             sub: 'Needs attention',               dot:'#E24B4A', color:'#A32D2D' },
  ].map(m => `
    <div class="metric">
      <div class="m-label">
        ${m.dot ? `<span class="m-dot" style="background:${m.dot}"></span>` : ''}
        ${m.label}
      </div>
      <div class="m-val" style="color:${m.color}">${m.val}</div>
      <div class="m-sub">${m.sub}</div>
    </div>
  `).join('');
}

function renderPillars() {
  const pillars = ['Integration','AI & Automation','Infrastructure','Vendor Consolidation'];
  document.getElementById('pillars').innerHTML = pillars.map(p => {
    const items   = allData.filter(d => d.pillar === p);
    if (!items.length) return '';
    const inprog  = items.filter(d => d.status === 'In Progress').length;
    const planned = items.filter(d => d.status === 'Planned').length;
    const blocked = items.filter(d => d.status === 'Blocked').length;
    const pct     = Math.round(inprog / items.length * 100);
    const c       = PILLAR_COLORS[p] || { bar:'#888', bg:'#eee', text:'#444' };
    return `
      <div class="pillar-card">
        <div class="p-header">
          <span class="p-name">${p}</span>
          <span class="p-count" style="background:${c.bg};color:${c.text}">${items.length}</span>
        </div>
        <div class="pillar-bar-track">
          <div class="pillar-bar-fill" style="width:${pct}%;background:${c.bar}"></div>
        </div>
        <div class="pillar-stats">
          <div class="pillar-stat">
            <span class="ps-left"><span class="ps-dot" style="background:#639922"></span>In progress</span>
            <span style="font-weight:500">${inprog}</span>
          </div>
          <div class="pillar-stat">
            <span class="ps-left"><span class="ps-dot" style="background:#888780"></span>Planned</span>
            <span>${planned}</span>
          </div>
          ${blocked ? `<div class="pillar-stat">
            <span class="ps-left"><span class="ps-dot" style="background:#E24B4A"></span>Blocked</span>
            <span style="color:#A32D2D;font-weight:500">${blocked}</span>
          </div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function renderFilters() {
  const filters = ['All','Integration','AI & Automation','Infrastructure','Vendor Consolidation','Critical','Blocked'];
  document.getElementById('filterBtns').innerHTML = filters.map(f =>
    `<button class="filter-btn${f === activeFilter ? ' active':''}" onclick="applyFilter('${f}')">${f}</button>`
  ).join('');
}

function applyFilter(f) {
  activeFilter = f;
  page = 0;
  if (f === 'All')      filtered = allData;
  else if (f === 'Critical') filtered = allData.filter(d => d.priority === 'Critical');
  else if (f === 'Blocked')  filtered = allData.filter(d => d.status === 'Blocked');
  else                  filtered = allData.filter(d => d.pillar === f);
  renderFilters();
  renderTable();
}

function renderTable() {
  const start = page * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById('initList').innerHTML = slice.length
    ? slice.map(d => {
        const pc = d.priority === 'Critical' ? 'p-critical' : d.priority === 'High' ? 'p-high' : 'p-medium';
        const sc = d.status === 'In Progress' ? 's-inprog' : d.status === 'Blocked' ? 's-blocked' : d.status === 'Complete' ? 's-complete' : 's-planned';
        const sdot = STATUS_DOT[d.status] || '#888';
        return `
          <div class="init-row">
            <span class="row-num">${d.n}</span>
            <span>
              <div class="row-name">${d.name}</div>
              <div class="row-sub">${d.fy || ''}</div>
            </span>
            <span class="row-pillar">${d.sub}</span>
            <span><span class="badge ${pc}">${d.priority}</span></span>
            <span><span class="badge ${sc}"><span class="badge-dot" style="background:${sdot}"></span>${d.status}</span></span>
          </div>`;
      }).join('')
    : '<div class="state-msg">No initiatives match this filter.</div>';

  document.getElementById('pgInfo').textContent =
    `${start+1}–${Math.min(start+PAGE_SIZE, filtered.length)} of ${filtered.length}`;
  document.getElementById('pgPrev').disabled = page === 0;
  document.getElementById('pgNext').disabled = start + PAGE_SIZE >= filtered.length;
}

window.changePage = dir => { page += dir; renderTable(); };
window.applyFilter = applyFilter;

loadData();
</script>
</body>
</html>
